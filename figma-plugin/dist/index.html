<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color: #1d1d1f;
        background: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f5f5f7;
      }

      main {
        min-height: 100vh;
        display: grid;
        gap: 14px;
        align-content: start;
        padding: 18px;
      }

      header {
        display: grid;
        gap: 6px;
        padding: 2px 0 4px;
      }

      .eyebrow {
        margin: 0;
        color: #0066cc;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #1d1d1f;
        font-size: 26px;
        line-height: 1.08;
        font-weight: 760;
        letter-spacing: 0;
      }

      .intro {
        margin: 0;
        color: #6e6e73;
        font-size: 13px;
        line-height: 1.36;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.72);
        padding: 10px 12px;
        color: #6e6e73;
        font-size: 12px;
        line-height: 1.3;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #34c759;
        flex: 0 0 auto;
      }

      .form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        margin: 0;
        color: #6e6e73;
        font-size: 12px;
        font-weight: 680;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #d2d2d7;
        border-radius: 12px;
        color: #1d1d1f;
        background: rgba(255, 255, 255, 0.92);
        padding: 11px 12px;
        font-size: 14px;
        outline: none;
      }

      textarea {
        min-height: 82px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: #0071e3;
        box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.14);
      }

      .mood-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .mood {
        min-height: 34px;
        border: 1px solid #d2d2d7;
        border-radius: 999px;
        color: #1d1d1f;
        background: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        font-weight: 680;
      }

      .mood.active {
        border-color: #0071e3;
        color: #ffffff;
        background: #0071e3;
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding-top: 2px;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 12px;
        color: #ffffff;
        background: #0071e3;
        font-size: 14px;
        font-weight: 760;
        cursor: pointer;
      }

      button.secondary {
        color: #1d1d1f;
        background: #e8e8ed;
      }

      button:disabled {
        opacity: 0.58;
        cursor: wait;
      }

      .error,
      .report,
      .plan {
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
      }

      .error {
        border: 1px solid rgba(255, 59, 48, 0.24);
        color: #b42318;
        padding: 12px;
        font-size: 13px;
        line-height: 1.38;
      }

      .report {
        display: grid;
        gap: 12px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        padding: 14px;
      }

      .score {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }

      .score strong {
        color: #1d1d1f;
        font-size: 17px;
        line-height: 1.18;
      }

      .badge {
        border-radius: 999px;
        padding: 5px 8px;
        color: #ffffff;
        background: #34c759;
        font-size: 11px;
        font-weight: 760;
        white-space: nowrap;
      }

      .badge.yellow {
        background: #ff9500;
      }

      .badge.orange {
        background: #ff6b22;
      }

      .badge.red {
        background: #ff3b30;
      }

      .summary {
        margin: 0;
        color: #6e6e73;
        font-size: 13px;
        line-height: 1.42;
      }

      .section-title {
        margin: 0 0 6px;
        color: #1d1d1f;
        font-size: 12px;
        font-weight: 760;
      }

      ul {
        display: grid;
        gap: 5px;
        margin: 0;
        padding-left: 18px;
        color: #6e6e73;
        font-size: 12px;
        line-height: 1.36;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .actions span {
        border: 1px solid #d2d2d7;
        border-radius: 999px;
        padding: 6px 9px;
        color: #1d1d1f;
        background: #f5f5f7;
        font-size: 11px;
        font-weight: 700;
      }

      .plan {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        padding: 12px;
        color: #6e6e73;
        font-size: 12px;
      }

      .plan strong {
        color: #1d1d1f;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Lotion</p>
        <h1>Проверка анимации</h1>
        <p class="intro">Выдели один объект в Figma, опиши смысл, а Lotion скажет, насколько он подходит для Lottie.</p>
      </header>

      <div class="status">
        <span class="status-dot"></span>
        <span>Подключение: сервер Vercel</span>
      </div>

      <section class="form">
        <label>
          Что это?
          <input id="whatIsIt" placeholder="Например: сундук, монета, замок" />
        </label>

        <label>
          Где используется?
          <input id="whereUsed" placeholder="Например: детская игра, onboarding, paywall" />
        </label>

        <label>
          Что должно произойти?
          <input id="desiredAction" placeholder="Например: открыться, начислиться, привлечь внимание" />
        </label>

        <label>
          Настроение
          <input id="mood" placeholder="Например: мягкое, весёлое, премиальное" />
        </label>

        <div class="mood-row">
          <button class="mood" data-mood="мягкое">Мягкое</button>
          <button class="mood" data-mood="игровое">Игровое</button>
          <button class="mood" data-mood="премиальное">Премиум</button>
        </div>

        <label>
          Дополнительное описание
          <textarea id="prompt" placeholder="Например: ребёнок получил приз после задания"></textarea>
        </label>
      </section>

      <div class="buttons">
        <button id="checkButton">Проверить</button>
        <button id="generateButton" class="secondary">Сгенерировать</button>
      </div>

      <div id="error" class="error" hidden></div>
      <section id="report" class="report" hidden></section>
      <section id="plan" class="plan" hidden></section>
    </main>

    <script>
      const backendUrl = "https://lotion-figma-plugin-git-main-artiskandirov-gmailcoms-projects.vercel.app";
      const fields = {
        whatIsIt: document.getElementById("whatIsIt"),
        whereUsed: document.getElementById("whereUsed"),
        desiredAction: document.getElementById("desiredAction"),
        mood: document.getElementById("mood"),
        prompt: document.getElementById("prompt")
      };
      const errorBox = document.getElementById("error");
      const reportBox = document.getElementById("report");
      const planBox = document.getElementById("plan");
      const checkButton = document.getElementById("checkButton");
      const generateButton = document.getElementById("generateButton");
      const moodButtons = Array.from(document.querySelectorAll(".mood"));

      const assetLabels = {
        chest: "сундук",
        coin: "монета",
        star: "звезда",
        lock: "замок",
        gift: "подарок",
        badge: "бейдж",
        button: "кнопка",
        checkmark: "галочка",
        warning: "предупреждение",
        progress: "прогресс",
        character: "персонаж",
        ui_asset: "UI-asset"
      };

      const scenarioLabels = {
        reward_reveal: "Появление награды",
        coin_collect: "Сбор монеты",
        unlock_success: "Разблокировка",
        success_pop: "Успешное действие",
        error_shake: "Ошибка",
        attention_float: "Привлечение внимания",
        progress_fill: "Заполнение прогресса"
      };

      function intent() {
        return {
          whatIsIt: fields.whatIsIt.value,
          whereUsed: fields.whereUsed.value,
          desiredAction: fields.desiredAction.value,
          mood: fields.mood.value,
          prompt: fields.prompt.value
        };
      }

      function setLoading(isLoading, type) {
        checkButton.disabled = isLoading;
        generateButton.disabled = isLoading;
        checkButton.textContent = isLoading && type === "check-feasibility" ? "Проверяю..." : "Проверить";
        generateButton.textContent = isLoading && type === "generate-lottie" ? "Генерирую..." : "Сгенерировать";
      }

      function send(type) {
        setLoading(true, type);
        errorBox.hidden = true;
        reportBox.hidden = true;
        planBox.hidden = true;
        parent.postMessage(
          {
            pluginMessage: {
              type,
              backendUrl,
              intent: intent()
            }
          },
          "*"
        );
      }

      function renderReport(report) {
        reportBox.hidden = false;
        reportBox.className = `report ${report.level}`;
        const canAnimate = (report.canAnimate || []).slice(0, 4).map((item) => `<li>${item}</li>`).join("");
        const fixes = (report.fixes || []).slice(0, 3).map((item) => `<li>${item}</li>`).join("");
        const actions = (report.actions || []).map((item) => `<span>${item}</span>`).join("");
        const assetType = assetLabels[report.assetType] || report.assetType;
        reportBox.innerHTML = `
          <div class="score">
            <strong>${report.title}</strong>
            <span class="badge ${report.level}">${assetType}</span>
          </div>
          <p class="summary">${report.summary}</p>
          <div>
            <p class="section-title">Можно анимировать</p>
            <ul>${canAnimate || "<li>Пока доступна только общая трансформация объекта.</li>"}</ul>
          </div>
          <div>
            <p class="section-title">Что важно учесть</p>
            <ul>${fixes || "<li>Явных проблем не найдено.</li>"}</ul>
          </div>
          <div class="actions">${actions}</div>
        `;
      }

      function renderPlan(plan) {
        planBox.hidden = false;
        const scenario = scenarioLabels[plan.scenario] || plan.scenario;
        planBox.innerHTML = `<strong>${scenario}</strong><span>${plan.animationPlan.length} шагов / ${plan.durationMs} мс</span>`;
      }

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;
        setLoading(false);

        if (message.type === "error") {
          errorBox.hidden = false;
          errorBox.textContent = `Не получилось выполнить запрос. ${message.message}`;
          return;
        }

        errorBox.hidden = true;
        if (message.requestType === "check-feasibility") {
          renderReport(message.result);
          planBox.hidden = true;
        } else {
          renderPlan(message.result.plan);
        }
      };

      moodButtons.forEach((button) => {
        button.addEventListener("click", () => {
          moodButtons.forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          fields.mood.value = button.dataset.mood;
        });
      });

      checkButton.addEventListener("click", () => send("check-feasibility"));
      generateButton.addEventListener("click", () => send("generate-lottie"));
    </script>
  </body>
</html>
