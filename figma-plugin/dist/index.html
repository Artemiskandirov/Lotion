<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color: #171719;
        background: #f6f7f9;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      header {
        display: grid;
        gap: 3px;
      }

      header p,
      h1,
      label,
      ul {
        margin: 0;
      }

      header p {
        color: #2457d6;
        font-size: 11px;
        font-weight: 750;
        text-transform: uppercase;
      }

      h1 {
        font-size: 20px;
        line-height: 1.14;
      }

      label {
        display: grid;
        gap: 5px;
        color: #666a73;
        font-size: 12px;
        font-weight: 700;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #d8dce3;
        border-radius: 6px;
        color: #171719;
        background: #ffffff;
        padding: 8px 9px;
      }

      textarea {
        resize: vertical;
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      button {
        min-height: 36px;
        border: 1px solid #2457d6;
        border-radius: 6px;
        color: #ffffff;
        background: #2457d6;
        font-weight: 800;
      }

      button.dark {
        border-color: #25262b;
        background: #25262b;
      }

      button:disabled {
        opacity: 0.6;
      }

      .error,
      .report,
      .plan {
        border-radius: 8px;
        padding: 10px;
        background: #ffffff;
      }

      .error {
        border: 1px solid #f0bbb5;
        color: #b42318;
      }

      .report {
        display: grid;
        gap: 8px;
        border: 1px solid #d8dce3;
        border-left: 4px solid #2457d6;
      }

      .report.green {
        border-left-color: #1e8b5c;
      }

      .report.yellow {
        border-left-color: #a66d00;
      }

      .report.orange {
        border-left-color: #bb4d17;
      }

      .report.red {
        border-left-color: #b42318;
      }

      .report div:first-child,
      .plan {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }

      .report span,
      .plan span,
      .report p,
      li {
        color: #666a73;
        font-size: 12px;
        line-height: 1.38;
      }

      ul {
        padding-left: 18px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .actions span {
        border: 1px solid #d8dce3;
        border-radius: 999px;
        padding: 5px 8px;
        color: #171719;
        font-size: 11px;
        font-weight: 750;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p>Motion Feasibility Check</p>
        <h1>Can this be animated?</h1>
      </header>

      <label>
        Backend
        <input id="backendUrl" value="https://lotion-figma-plugin-git-main-artiskandirov-gmailcoms-projects.vercel.app" />
      </label>

      <label>
        What is it?
        <input id="whatIsIt" />
      </label>

      <label>
        Where is it used?
        <input id="whereUsed" />
      </label>

      <label>
        What should happen?
        <input id="desiredAction" />
      </label>

      <label>
        Mood
        <input id="mood" />
      </label>

      <label>
        Prompt
        <textarea id="prompt" rows="3"></textarea>
      </label>

      <div class="buttons">
        <button id="checkButton">Check</button>
        <button id="generateButton" class="dark">Generate</button>
      </div>

      <div id="error" class="error" hidden></div>
      <section id="report" class="report" hidden></section>
      <section id="plan" class="plan" hidden></section>
    </main>

    <script>
      const fields = {
        backendUrl: document.getElementById("backendUrl"),
        whatIsIt: document.getElementById("whatIsIt"),
        whereUsed: document.getElementById("whereUsed"),
        desiredAction: document.getElementById("desiredAction"),
        mood: document.getElementById("mood"),
        prompt: document.getElementById("prompt")
      };
      const errorBox = document.getElementById("error");
      const reportBox = document.getElementById("report");
      const planBox = document.getElementById("plan");
      const checkButton = document.getElementById("checkButton");
      const generateButton = document.getElementById("generateButton");

      function intent() {
        return {
          whatIsIt: fields.whatIsIt.value,
          whereUsed: fields.whereUsed.value,
          desiredAction: fields.desiredAction.value,
          mood: fields.mood.value,
          prompt: fields.prompt.value
        };
      }

      function setLoading(isLoading) {
        checkButton.disabled = isLoading;
        generateButton.disabled = isLoading;
      }

      function send(type) {
        setLoading(true);
        errorBox.hidden = true;
        reportBox.hidden = true;
        planBox.hidden = true;
        parent.postMessage(
          {
            pluginMessage: {
              type,
              backendUrl: fields.backendUrl.value,
              intent: intent()
            }
          },
          "*"
        );
      }

      function renderReport(report) {
        reportBox.hidden = false;
        reportBox.className = `report ${report.level}`;
        const canAnimate = (report.canAnimate || []).slice(0, 4).map((item) => `<li>${item}</li>`).join("");
        const actions = (report.actions || []).map((item) => `<span>${item}</span>`).join("");
        reportBox.innerHTML = `
          <div><strong>${report.title}</strong><span>${report.assetType}</span></div>
          <p>${report.summary}</p>
          <ul>${canAnimate}</ul>
          <div class="actions">${actions}</div>
        `;
      }

      function renderPlan(plan) {
        planBox.hidden = false;
        planBox.innerHTML = `<strong>${plan.scenario}</strong><span>${plan.animationPlan.length} steps / ${plan.durationMs} ms</span>`;
      }

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;
        setLoading(false);

        if (message.type === "error") {
          errorBox.hidden = false;
          errorBox.textContent = `${message.message} Backend: ${fields.backendUrl.value}`;
          return;
        }

        errorBox.hidden = true;
        if (message.requestType === "check-feasibility") {
          renderReport(message.result);
          planBox.hidden = true;
        } else {
          renderPlan(message.result.plan);
        }
      };

      checkButton.addEventListener("click", () => send("check-feasibility"));
      generateButton.addEventListener("click", () => send("generate-lottie"));
    </script>
  </body>
</html>
