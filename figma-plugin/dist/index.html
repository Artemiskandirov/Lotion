<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color: #1d1d1f;
        background: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f5f5f7;
      }

      main {
        min-height: 100vh;
        display: grid;
        gap: 14px;
        align-content: start;
        padding: 18px;
      }

      header {
        display: grid;
        gap: 6px;
        padding: 2px 0 4px;
      }

      .eyebrow {
        margin: 0;
        color: #0066cc;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #1d1d1f;
        font-size: 26px;
        line-height: 1.08;
        font-weight: 760;
        letter-spacing: 0;
      }

      .intro {
        margin: 0;
        color: #6e6e73;
        font-size: 13px;
        line-height: 1.36;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.72);
        padding: 10px 12px;
        color: #6e6e73;
        font-size: 12px;
        line-height: 1.3;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #34c759;
        flex: 0 0 auto;
      }

      .form {
        display: grid;
        gap: 12px;
      }

      #checkView {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        margin: 0;
        color: #6e6e73;
        font-size: 12px;
        font-weight: 680;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #d2d2d7;
        border-radius: 12px;
        color: #1d1d1f;
        background: rgba(255, 255, 255, 0.92);
        padding: 11px 12px;
        font-size: 14px;
        outline: none;
      }

      textarea {
        min-height: 82px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: #0071e3;
        box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.14);
      }

      .mood-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .mood {
        min-height: 34px;
        border: 1px solid #d2d2d7;
        border-radius: 999px;
        color: #1d1d1f;
        background: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        font-weight: 680;
      }

      .mood.active {
        border-color: #0071e3;
        color: #ffffff;
        background: #0071e3;
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding-top: 2px;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 12px;
        color: #ffffff;
        background: #0071e3;
        font-size: 14px;
        font-weight: 760;
        cursor: pointer;
      }

      button.secondary {
        color: #1d1d1f;
        background: #e8e8ed;
      }

      button:disabled {
        opacity: 0.58;
        cursor: wait;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        border-radius: 12px;
        background: #e8e8ed;
        padding: 4px;
      }

      .tabs button {
        min-height: 34px;
        border-radius: 9px;
        color: #6e6e73;
        background: transparent;
        font-size: 13px;
        font-weight: 760;
      }

      .tabs button.active {
        color: #1d1d1f;
        background: #ffffff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }

      .error,
      .report,
      .plan,
      .logs-panel {
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
      }

      .error {
        border: 1px solid rgba(255, 59, 48, 0.24);
        color: #b42318;
        padding: 12px;
        font-size: 13px;
        line-height: 1.38;
      }

      .report {
        display: grid;
        gap: 12px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        padding: 14px;
      }

      .score {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }

      .score strong {
        color: #1d1d1f;
        font-size: 17px;
        line-height: 1.18;
      }

      .badge {
        border-radius: 999px;
        padding: 5px 8px;
        color: #ffffff;
        background: #34c759;
        font-size: 11px;
        font-weight: 760;
        white-space: nowrap;
      }

      .badge.yellow {
        background: #ff9500;
      }

      .badge.orange {
        background: #ff6b22;
      }

      .badge.red {
        background: #ff3b30;
      }

      .summary {
        margin: 0;
        color: #6e6e73;
        font-size: 13px;
        line-height: 1.42;
      }

      .section-title {
        margin: 0 0 6px;
        color: #1d1d1f;
        font-size: 12px;
        font-weight: 760;
      }

      ul {
        display: grid;
        gap: 5px;
        margin: 0;
        padding-left: 18px;
        color: #6e6e73;
        font-size: 12px;
        line-height: 1.36;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .actions span {
        border: 1px solid #d2d2d7;
        border-radius: 999px;
        padding: 6px 9px;
        color: #1d1d1f;
        background: #f5f5f7;
        font-size: 11px;
        font-weight: 700;
      }

      .plan {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        padding: 12px;
        color: #6e6e73;
        font-size: 12px;
      }

      .plan strong {
        color: #1d1d1f;
      }

      .logs-panel {
        display: grid;
        gap: 10px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        padding: 12px;
        min-height: 330px;
      }

      .logs-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .logs-head strong {
        color: #1d1d1f;
        font-size: 15px;
      }

      .logs-head button {
        min-height: 30px;
        border-radius: 999px;
        padding: 0 10px;
        color: #1d1d1f;
        background: #e8e8ed;
        font-size: 12px;
      }

      .logs-list {
        display: grid;
        gap: 8px;
        max-height: 430px;
        overflow: auto;
        padding-right: 2px;
      }

      .log {
        display: grid;
        gap: 6px;
        border: 1px solid #d2d2d7;
        border-left: 4px solid #8e8e93;
        border-radius: 12px;
        background: #ffffff;
        padding: 10px;
      }

      .log.warn {
        border-left-color: #ff9500;
      }

      .log.error {
        border-left-color: #ff3b30;
      }

      .log div {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        color: #6e6e73;
        font-size: 11px;
      }

      .log strong,
      .log em {
        border-radius: 999px;
        background: #f5f5f7;
        padding: 3px 6px;
        color: #1d1d1f;
        font-style: normal;
        font-weight: 700;
      }

      .log.error em {
        color: #b42318;
        background: rgba(255, 59, 48, 0.12);
      }

      .log.warn em {
        color: #9a5b00;
        background: rgba(255, 149, 0, 0.14);
      }

      .log p {
        margin: 0;
        color: #1d1d1f;
        font-size: 12px;
        line-height: 1.35;
      }

      .log pre {
        max-height: 170px;
        overflow: auto;
        margin: 0;
        border-radius: 10px;
        background: #f5f5f7;
        padding: 8px;
        color: #3a3a3c;
        font-family: "SF Mono", Menlo, Consolas, monospace;
        font-size: 10px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty-log {
        margin: 0;
        color: #6e6e73;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Lotion</p>
        <h1>Проверка анимации</h1>
        <p class="intro">Выдели один объект в Figma, опиши смысл, а Lotion скажет, насколько он подходит для Lottie.</p>
      </header>

      <div class="status">
        <span class="status-dot"></span>
        <span>Backend: lotion-figma-plugin.vercel.app</span>
      </div>

      <nav class="tabs">
        <button id="checkTab" class="active">Проверка</button>
        <button id="logsTab">Логи</button>
      </nav>

      <section id="checkView">
        <section class="form">
          <label>
            Что это?
            <input id="whatIsIt" placeholder="Например: сундук, монета, замок" />
          </label>

          <label>
            Где используется?
            <input id="whereUsed" placeholder="Например: детская игра, onboarding, paywall" />
          </label>

          <label>
            Что должно произойти?
            <input id="desiredAction" placeholder="Например: открыться, начислиться, привлечь внимание" />
          </label>

          <label>
            Настроение
            <input id="mood" placeholder="Например: мягкое, весёлое, премиальное" />
          </label>

          <div class="mood-row">
            <button class="mood" data-mood="мягкое">Мягкое</button>
            <button class="mood" data-mood="игровое">Игровое</button>
            <button class="mood" data-mood="премиальное">Премиум</button>
          </div>

          <label>
            Дополнительное описание
            <textarea id="prompt" placeholder="Например: ребёнок получил приз после задания"></textarea>
          </label>
        </section>

        <div class="buttons">
          <button id="checkButton">Проверить</button>
          <button id="generateButton" class="secondary">Сгенерировать</button>
        </div>

        <div id="error" class="error" hidden></div>
        <section id="report" class="report" hidden></section>
        <section id="plan" class="plan" hidden></section>
      </section>

      <section id="logsView" class="logs-panel" hidden>
        <div class="logs-head">
          <strong>Логи</strong>
          <button id="clearLogsButton">Очистить</button>
        </div>
        <div id="logsList" class="logs-list"></div>
      </section>
    </main>

    <script>
      const backendUrl = "https://lotion-figma-plugin.vercel.app";
      const fields = {
        whatIsIt: document.getElementById("whatIsIt"),
        whereUsed: document.getElementById("whereUsed"),
        desiredAction: document.getElementById("desiredAction"),
        mood: document.getElementById("mood"),
        prompt: document.getElementById("prompt")
      };
      const errorBox = document.getElementById("error");
      const reportBox = document.getElementById("report");
      const planBox = document.getElementById("plan");
      const checkButton = document.getElementById("checkButton");
      const generateButton = document.getElementById("generateButton");
      const checkTab = document.getElementById("checkTab");
      const logsTab = document.getElementById("logsTab");
      const checkView = document.getElementById("checkView");
      const logsView = document.getElementById("logsView");
      const logsList = document.getElementById("logsList");
      const clearLogsButton = document.getElementById("clearLogsButton");
      const moodButtons = Array.from(document.querySelectorAll(".mood"));
      let logs = [
        {
          id: Date.now(),
          time: new Date().toISOString(),
          level: "info",
          source: "ui",
          message: "UI загружен",
          data: { backendUrl }
        }
      ];

      const assetLabels = {
        chest: "сундук",
        coin: "монета",
        star: "звезда",
        lock: "замок",
        gift: "подарок",
        badge: "бейдж",
        button: "кнопка",
        checkmark: "галочка",
        warning: "предупреждение",
        progress: "прогресс",
        character: "персонаж",
        ui_asset: "UI-asset"
      };

      const scenarioLabels = {
        reward_reveal: "Появление награды",
        coin_collect: "Сбор монеты",
        unlock_success: "Разблокировка",
        success_pop: "Успешное действие",
        error_shake: "Ошибка",
        attention_float: "Привлечение внимания",
        progress_fill: "Заполнение прогресса"
      };

      function intent() {
        return {
          whatIsIt: fields.whatIsIt.value,
          whereUsed: fields.whereUsed.value,
          desiredAction: fields.desiredAction.value,
          mood: fields.mood.value,
          prompt: fields.prompt.value
        };
      }

      function setLoading(isLoading, type) {
        checkButton.disabled = isLoading;
        generateButton.disabled = isLoading;
        checkButton.textContent = isLoading && type === "check-feasibility" ? "Проверяю..." : "Проверить";
        generateButton.textContent = isLoading && type === "generate-lottie" ? "Генерирую..." : "Сгенерировать";
      }

      function formatLogData(data) {
        if (data === undefined) return "";
        try {
          return JSON.stringify(data, null, 2);
        } catch (error) {
          return String(data);
        }
      }

      function addLog(level, message, data) {
        logs = logs.concat([{
          id: Date.now() + Math.random(),
          time: new Date().toISOString(),
          level,
          source: "ui",
          message,
          data
        }]).slice(-220);
        renderLogs();
      }

      function renderLogs() {
        if (!logs.length) {
          logsList.innerHTML = '<p class="empty-log">Логов пока нет.</p>';
          return;
        }

        logsList.innerHTML = logs.map((entry) => {
          const data = entry.data === undefined ? "" : `<pre>${escapeHtml(formatLogData(entry.data))}</pre>`;
          return `
            <article class="log ${entry.level}">
              <div>
                <span>${new Date(entry.time).toLocaleTimeString("ru-RU")}</span>
                <strong>${escapeHtml(entry.source)}</strong>
                <em>${escapeHtml(entry.level)}</em>
              </div>
              <p>${escapeHtml(entry.message)}</p>
              ${data}
            </article>
          `;
        }).join("");
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function setTab(tab) {
        const showLogs = tab === "logs";
        logsView.hidden = !showLogs;
        checkView.hidden = showLogs;
        logsTab.classList.toggle("active", showLogs);
        checkTab.classList.toggle("active", !showLogs);
        if (showLogs) renderLogs();
      }

      function send(type) {
        setLoading(true, type);
        errorBox.hidden = true;
        reportBox.hidden = true;
        planBox.hidden = true;
        addLog("info", "UI отправил команду в plugin thread", { type, backendUrl, intent: intent() });
        parent.postMessage(
          {
            pluginMessage: {
              type,
              backendUrl,
              intent: intent()
            }
          },
          "*"
        );
      }

      function renderReport(report) {
        reportBox.hidden = false;
        reportBox.className = `report ${report.level}`;
        const canAnimate = (report.canAnimate || []).slice(0, 4).map((item) => `<li>${item}</li>`).join("");
        const fixes = (report.fixes || []).slice(0, 3).map((item) => `<li>${item}</li>`).join("");
        const actions = (report.actions || []).map((item) => `<span>${item}</span>`).join("");
        const assetType = assetLabels[report.assetType] || report.assetType;
        reportBox.innerHTML = `
          <div class="score">
            <strong>${report.title}</strong>
            <span class="badge ${report.level}">${assetType}</span>
          </div>
          <p class="summary">${report.summary}</p>
          <div>
            <p class="section-title">Можно анимировать</p>
            <ul>${canAnimate || "<li>Пока доступна только общая трансформация объекта.</li>"}</ul>
          </div>
          <div>
            <p class="section-title">Что важно учесть</p>
            <ul>${fixes || "<li>Явных проблем не найдено.</li>"}</ul>
          </div>
          <div class="actions">${actions}</div>
        `;
      }

      function renderPlan(plan, createdPreview) {
        planBox.hidden = false;
        const scenario = scenarioLabels[plan.scenario] || plan.scenario;
        const status = createdPreview
          ? `Создано: ${escapeHtml(createdPreview.name)}`
          : `${plan.animationPlan.length} шагов / ${plan.durationMs} мс`;
        planBox.innerHTML = `<strong>${scenario}</strong><span>${status}</span>`;
      }

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "log-entry") {
          logs = logs.concat([message.entry]).slice(-220);
          renderLogs();
          return;
        }

        if (message.type === "log-snapshot") {
          logs = logs.filter((entry) => entry.source === "ui").concat(message.logs).slice(-220);
          renderLogs();
          return;
        }

        setLoading(false);

        if (message.type === "error") {
          addLog("error", "UI получил ошибку", { message: message.message });
          errorBox.hidden = false;
          errorBox.textContent = `Не получилось выполнить запрос. ${message.message}`;
          setTab("logs");
          return;
        }

        errorBox.hidden = true;
        if (message.requestType === "check-feasibility") {
          addLog("info", "UI получил отчёт проверки", { level: message.result.level, score: message.result.score });
          renderReport(message.result);
          planBox.hidden = true;
        } else {
          addLog("info", "UI получил план генерации", {
            scenario: message.result.plan.scenario,
            durationMs: message.result.plan.durationMs,
            createdPreview: message.createdPreview
          });
          renderPlan(message.result.plan, message.createdPreview);
        }
      };

      moodButtons.forEach((button) => {
        button.addEventListener("click", () => {
          moodButtons.forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          fields.mood.value = button.dataset.mood;
          addLog("info", "Выбрано настроение", { mood: button.dataset.mood });
        });
      });

      checkTab.addEventListener("click", () => setTab("check"));
      logsTab.addEventListener("click", () => setTab("logs"));
      clearLogsButton.addEventListener("click", () => {
        logs = [];
        renderLogs();
        parent.postMessage({ pluginMessage: { type: "clear-logs" } }, "*");
      });
      checkButton.addEventListener("click", () => send("check-feasibility"));
      generateButton.addEventListener("click", () => send("generate-lottie"));
      renderLogs();
      parent.postMessage({ pluginMessage: { type: "request-logs" } }, "*");
    </script>
  </body>
</html>
