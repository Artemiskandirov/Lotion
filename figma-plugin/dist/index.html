<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color: #1d1d1f;
        background: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f5f5f7;
      }

      main {
        min-height: 100vh;
        display: grid;
        gap: 14px;
        align-content: start;
        padding: 18px;
      }

      main.logs-mode {
        grid-template-rows: auto 1fr;
        align-content: stretch;
        padding: 12px;
      }

      header {
        display: grid;
        gap: 6px;
        padding: 2px 0 4px;
      }

      .eyebrow {
        margin: 0;
        color: #0066cc;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #1d1d1f;
        font-size: 26px;
        line-height: 1.08;
        font-weight: 760;
        letter-spacing: 0;
      }

      .intro {
        margin: 0;
        color: #6e6e73;
        font-size: 13px;
        line-height: 1.36;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.72);
        padding: 10px 12px;
        color: #6e6e73;
        font-size: 12px;
        line-height: 1.3;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #34c759;
        flex: 0 0 auto;
      }

      .form {
        display: grid;
        gap: 12px;
      }

      #checkView {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        margin: 0;
        color: #6e6e73;
        font-size: 12px;
        font-weight: 680;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #d2d2d7;
        border-radius: 12px;
        color: #1d1d1f;
        background: rgba(255, 255, 255, 0.92);
        padding: 11px 12px;
        font-size: 14px;
        outline: none;
      }

      textarea {
        min-height: 82px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: #0071e3;
        box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.14);
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding-top: 2px;
      }

      .generate-button {
        width: 100%;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 12px;
        color: #ffffff;
        background: #0071e3;
        font-size: 14px;
        font-weight: 760;
        cursor: pointer;
      }

      button.secondary {
        color: #1d1d1f;
        background: #e8e8ed;
      }

      button:disabled {
        opacity: 0.58;
        cursor: wait;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        border-radius: 12px;
        background: #e8e8ed;
        padding: 4px;
      }

      .tabs button {
        min-height: 34px;
        border-radius: 9px;
        color: #6e6e73;
        background: transparent;
        font-size: 13px;
        font-weight: 760;
      }

      .tabs button.active {
        color: #1d1d1f;
        background: #ffffff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }

      .error,
      .report,
      .plan,
      .logs-panel {
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
      }

      .error {
        border: 1px solid rgba(255, 59, 48, 0.24);
        color: #b42318;
        padding: 12px;
        font-size: 13px;
        line-height: 1.38;
      }

      .report {
        display: grid;
        gap: 12px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        padding: 14px;
      }

      .score {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }

      .score strong {
        color: #1d1d1f;
        font-size: 17px;
        line-height: 1.18;
      }

      .badge {
        border-radius: 999px;
        padding: 5px 8px;
        color: #ffffff;
        background: #34c759;
        font-size: 11px;
        font-weight: 760;
        white-space: nowrap;
      }

      .badge.yellow {
        background: #ff9500;
      }

      .badge.orange {
        background: #ff6b22;
      }

      .badge.red {
        background: #ff3b30;
      }

      .summary {
        margin: 0;
        color: #6e6e73;
        font-size: 13px;
        line-height: 1.42;
      }

      .section-title {
        margin: 0 0 6px;
        color: #1d1d1f;
        font-size: 12px;
        font-weight: 760;
      }

      ul {
        display: grid;
        gap: 5px;
        margin: 0;
        padding-left: 18px;
        color: #6e6e73;
        font-size: 12px;
        line-height: 1.36;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .actions span {
        border: 1px solid #d2d2d7;
        border-radius: 999px;
        padding: 6px 9px;
        color: #1d1d1f;
        background: #f5f5f7;
        font-size: 11px;
        font-weight: 700;
      }

      .plan {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        padding: 12px;
        color: #6e6e73;
        font-size: 12px;
      }

      .plan strong {
        color: #1d1d1f;
      }

      .preview-panel {
        display: grid;
        gap: 10px;
      }

      .preview-stage {
        --preview-duration: 2s;
        display: grid;
        place-items: center;
        min-height: 220px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 16px;
        background: #ffffff;
        overflow: hidden;
      }

      .preview-stage span {
        color: #6e6e73;
        font-size: 13px;
      }

      .preview-asset {
        display: block;
        max-width: 62%;
        max-height: 160px;
        animation-duration: var(--preview-duration);
        animation-iteration-count: infinite;
        animation-timing-function: ease-in-out;
        transform-origin: center;
      }

      .preview-asset.dynamic {
        animation-name: lotion-dynamic-preview;
      }

      .preview-shape {
        display: block;
        animation-duration: var(--preview-duration);
        animation-iteration-count: infinite;
        animation-timing-function: ease-in-out;
        transform-origin: center;
      }

      .preview-shape.dynamic {
        animation-name: lotion-dynamic-preview;
      }

      .preview-meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: #6e6e73;
        font-size: 12px;
      }

      .preview-meta strong {
        color: #1d1d1f;
      }

      .preview-details,
      #previewDetails {
        display: grid;
        gap: 8px;
      }

      .preview-summary {
        margin: 0;
        color: #6e6e73;
        font-size: 12px;
        line-height: 1.4;
      }

      .motion-steps {
        display: grid;
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .motion-steps li {
        display: grid;
        grid-template-columns: 48px 1fr;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(0, 0, 0, 0.07);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.76);
        padding: 8px 10px;
        color: #1d1d1f;
        font-size: 12px;
      }

      .motion-steps span {
        color: #86868b;
        font-size: 11px;
      }

      .motion-steps strong {
        font-weight: 720;
      }

      .export-panel {
        display: grid;
        gap: 8px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.84);
        padding: 10px;
      }

      .export-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .export-head strong {
        color: #1d1d1f;
        font-size: 13px;
      }

      .export-head button {
        min-height: 30px;
        border-radius: 999px;
        padding: 0 12px;
        font-size: 12px;
      }

      .json-output {
        min-height: 120px;
        max-height: 180px;
        font-family: "SF Mono", Menlo, Consolas, monospace;
        font-size: 10px;
        line-height: 1.45;
      }

      .lottie-output {
        min-height: 180px;
      }

      .logs-panel {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 10px;
        min-height: 0;
        background: transparent;
        box-shadow: none;
      }

      .logs-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .logs-head strong {
        color: #1d1d1f;
        font-size: 15px;
      }

      .logs-head button {
        min-height: 30px;
        border-radius: 999px;
        padding: 0 10px;
        color: #1d1d1f;
        background: #e8e8ed;
        font-size: 12px;
      }

      .logs-text {
        min-height: 0;
        height: 100%;
        overflow: auto;
        margin: 0;
        border: 1px solid #d2d2d7;
        border-radius: 10px;
        background: #ffffff;
        padding: 10px;
        color: #1d1d1f;
        font-family: "SF Mono", Menlo, Consolas, monospace;
        font-size: 11px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        resize: none;
      }
    </style>
  </head>
  <body>
    <main id="appMain">
      <header id="productHeader">
        <p class="eyebrow">Lotion</p>
        <h1>Генерация Lottie</h1>
        <p class="intro">Выдели объект, опиши движение одним prompt-ом и задай длительность до 5 секунд.</p>
      </header>

      <div id="backendStatus" class="status">
        <span class="status-dot"></span>
        <span>Backend: lotion-figma-plugin.vercel.app</span>
      </div>

      <nav class="tabs">
        <button id="checkTab" class="active">Проверка</button>
        <button id="logsTab">Логи</button>
      </nav>

      <section id="checkView">
        <section class="form">
          <label>
            Prompt
            <textarea id="prompt" rows="5" placeholder="Например: прыгает как мячик с лёгким squash/stretch, весело и мягко"></textarea>
          </label>

          <label>
            <span id="durationLabel">Длительность: 2 сек</span>
            <input id="durationSec" type="range" min="0.5" max="5" step="0.5" value="2" />
          </label>
        </section>

        <button id="generateButton" class="generate-button">Сгенерировать</button>

        <div id="error" class="error" hidden></div>
        <section id="report" class="report" hidden></section>
        <section id="plan" class="plan" hidden></section>
        <section id="previewPanel" class="preview-panel" hidden>
          <div id="previewStage" class="preview-stage">
            <span>Preview появится здесь</span>
          </div>
          <div class="preview-meta">
            <strong id="previewScenario"></strong>
            <span id="previewTiming"></span>
          </div>
          <div id="previewDetails"></div>
          <section id="exportPanel" class="export-panel" hidden>
            <div class="export-head">
              <strong>Lottie JSON</strong>
              <button id="downloadLottieButton">Скачать .json</button>
            </div>
            <textarea id="lottieOutput" class="json-output lottie-output" readonly></textarea>
          </section>
          <textarea id="jsonOutput" class="json-output" readonly></textarea>
        </section>
      </section>

      <section id="logsView" class="logs-panel" hidden>
        <div class="logs-head">
          <strong>Логи</strong>
          <button id="clearLogsButton">Очистить</button>
        </div>
        <textarea id="logsText" class="logs-text" readonly></textarea>
      </section>
    </main>

    <script>
      const backendUrl = "https://lotion-figma-plugin.vercel.app";
      const fields = {
        prompt: document.getElementById("prompt"),
        durationSec: document.getElementById("durationSec")
      };
      const durationLabel = document.getElementById("durationLabel");
      const errorBox = document.getElementById("error");
      const reportBox = document.getElementById("report");
      const planBox = document.getElementById("plan");
      const generateButton = document.getElementById("generateButton");
      const previewPanel = document.getElementById("previewPanel");
      const previewStage = document.getElementById("previewStage");
      const previewScenario = document.getElementById("previewScenario");
      const previewTiming = document.getElementById("previewTiming");
      const previewDetails = document.getElementById("previewDetails");
      const exportPanel = document.getElementById("exportPanel");
      const downloadLottieButton = document.getElementById("downloadLottieButton");
      const lottieOutput = document.getElementById("lottieOutput");
      const jsonOutput = document.getElementById("jsonOutput");
      const appMain = document.getElementById("appMain");
      const productHeader = document.getElementById("productHeader");
      const backendStatus = document.getElementById("backendStatus");
      const checkTab = document.getElementById("checkTab");
      const logsTab = document.getElementById("logsTab");
      const checkView = document.getElementById("checkView");
      const logsView = document.getElementById("logsView");
      const logsText = document.getElementById("logsText");
      const clearLogsButton = document.getElementById("clearLogsButton");
      const dynamicPreviewStyle = document.createElement("style");
      dynamicPreviewStyle.id = "lotion-dynamic-preview-style";
      document.head.appendChild(dynamicPreviewStyle);
      let lastLottie = null;
      let lastPlan = null;
      let logs = [
        {
          id: Date.now(),
          time: new Date().toISOString(),
          level: "info",
          source: "ui",
          message: "UI загружен",
          data: { backendUrl }
        }
      ];

      const assetLabels = {
        chest: "сундук",
        coin: "монета",
        star: "звезда",
        lock: "замок",
        gift: "подарок",
        badge: "бейдж",
        button: "кнопка",
        checkmark: "галочка",
        warning: "предупреждение",
        progress: "прогресс",
        character: "персонаж",
        ui_asset: "UI-asset"
      };

      const scenarioLabels = {
        reward_reveal: "Появление награды",
        coin_collect: "Сбор монеты",
        unlock_success: "Разблокировка",
        success_pop: "Успешное действие",
        error_shake: "Ошибка",
        attention_float: "Мягкое движение",
        spring_bounce: "Пружинный прыжок",
        progress_fill: "Заполнение прогресса"
      };

      const actionLabels = {
        pulse: "сжимается",
        scale_pop: "распружинивается",
        soft_bounce: "мягко подпрыгивает",
        squash_stretch: "сжимается и растягивается",
        float_y: "прыгает",
        shake_x: "дрожит после приземления",
        shake_rotate: "покачивается",
        rotate_open: "поворачивается",
        fade_in: "появляется",
        fade_out: "исчезает",
        burst_particles: "даёт всплеск",
        sparkle_burst: "рассыпает искры",
        coin_burst: "рассыпает монетки",
        shine_sweep: "блестит",
        fly_to_target: "летит к цели",
        stagger_appear: "появляется частями",
        draw_stroke: "рисуется линией",
        button_press: "нажимается",
        pulse_glow: "подсвечивается"
      };

      function intent() {
        return {
          prompt: fields.prompt.value,
          durationSec: Number(fields.durationSec.value)
        };
      }

      function setLoading(isLoading, type) {
        generateButton.disabled = isLoading || !fields.prompt.value.trim();
        generateButton.textContent = isLoading && type === "generate-lottie" ? "Генерирую..." : "Сгенерировать";
      }

      function formatLogData(data) {
        if (data === undefined) return "";
        try {
          return JSON.stringify(data, null, 2);
        } catch (error) {
          return String(data);
        }
      }

      function addLog(level, message, data) {
        logs = logs.concat([{
          id: Date.now() + Math.random(),
          time: new Date().toISOString(),
          level,
          source: "ui",
          message,
          data
        }]).slice(-220);
        renderLogs();
      }

      function renderLogs() {
        logsText.value = logs.length ? logs.map(formatLogEntry).join("\n\n") : "Логов пока нет.";
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatLogEntry(entry) {
        const data = formatLogData(entry.data);
        return [
          `${new Date(entry.time).toLocaleTimeString("ru-RU")} ${entry.source} ${entry.level}`,
          entry.message,
          data
        ].filter(Boolean).join("\n");
      }

      function setTab(tab) {
        const showLogs = tab === "logs";
        logsView.hidden = !showLogs;
        checkView.hidden = showLogs;
        productHeader.hidden = showLogs;
        backendStatus.hidden = showLogs;
        appMain.classList.toggle("logs-mode", showLogs);
        logsTab.classList.toggle("active", showLogs);
        checkTab.classList.toggle("active", !showLogs);
        if (showLogs) renderLogs();
      }

      function send(type) {
        setLoading(true, type);
        errorBox.hidden = true;
        reportBox.hidden = true;
        planBox.hidden = true;
        previewPanel.hidden = true;
        exportPanel.hidden = true;
        lastLottie = null;
        lastPlan = null;
        addLog("info", "UI отправил команду в plugin thread", { type, backendUrl, intent: intent() });
        parent.postMessage(
          {
            pluginMessage: {
              type,
              backendUrl,
              intent: intent()
            }
          },
          "*"
        );
      }

      function renderReport(report) {
        reportBox.hidden = false;
        reportBox.className = `report ${report.level}`;
        const canAnimate = (report.canAnimate || []).slice(0, 4).map((item) => `<li>${item}</li>`).join("");
        const fixes = (report.fixes || []).slice(0, 3).map((item) => `<li>${item}</li>`).join("");
        const actions = (report.actions || []).map((item) => `<span>${item}</span>`).join("");
        const assetType = assetLabels[report.assetType] || report.assetType;
        reportBox.innerHTML = `
          <div class="score">
            <strong>${report.title}</strong>
            <span class="badge ${report.level}">${assetType}</span>
          </div>
          <p class="summary">${report.summary}</p>
          <div>
            <p class="section-title">Можно анимировать</p>
            <ul>${canAnimate || "<li>Пока доступна только общая трансформация объекта.</li>"}</ul>
          </div>
          <div>
            <p class="section-title">Что важно учесть</p>
            <ul>${fixes || "<li>Явных проблем не найдено.</li>"}</ul>
          </div>
          <div class="actions">${actions}</div>
        `;
      }

      function renderPlan(plan) {
        planBox.hidden = false;
        const scenario = planTitle(plan);
        const status = `${plan.animationPlan.length} шагов / ${plan.durationMs} мс`;
        planBox.innerHTML = `<strong>${scenario}</strong><span>${status}</span>`;
      }

      function asRecord(value) {
        return value && typeof value === "object" ? value : {};
      }

      function firstPreviewLayer() {
        return ((lastLottie && lastLottie.layers) || []).map(asRecord).find((layer) => layer.ty === 2 || layer.ty === 4);
      }

      function numberArray(value) {
        return Array.isArray(value) && value.every((item) => typeof item === "number") ? value : undefined;
      }

      function keyList(layer, key) {
        const ks = asRecord(layer.ks);
        const prop = asRecord(ks[key]);
        return Array.isArray(prop.k) ? prop.k.map(asRecord) : [];
      }

      function valueAt(layer, key, frame, fallback) {
        const keys = keyList(layer, key);
        if (!keys.length) return fallback;
        const exact = keys.find((item) => item.t === frame);
        const earlier = keys.filter((item) => typeof item.t === "number" && item.t <= frame);
        const nearest = exact || earlier[earlier.length - 1] || keys[0];
        return numberArray(nearest.s) || fallback;
      }

      function lottiePreviewSrc(layer) {
        if (!layer || layer.ty !== 2 || typeof layer.refId !== "string") return "";
        const asset = ((lastLottie && lastLottie.assets) || []).map(asRecord).find((item) => item.id === layer.refId);
        return asset && typeof asset.p === "string" ? asset.p : "";
      }

      function shapePreviewStyle(layer) {
        const shapeGroup = (Array.isArray(layer && layer.shapes) ? layer.shapes : []).map(asRecord)[0];
        const items = Array.isArray(shapeGroup && shapeGroup.it) ? shapeGroup.it.map(asRecord) : [];
        const geometry = items.find((item) => item.ty === "rc" || item.ty === "el");
        const fill = items.find((item) => item.ty === "fl");
        const size = numberArray(asRecord(asRecord(geometry).s).k) || [(lastLottie && lastLottie.w) || 80, (lastLottie && lastLottie.h) || 80];
        const color = numberArray(asRecord(asRecord(fill).c).k) || [0.24, 0.42, 0.94, 1];
        const rgb = color.slice(0, 3).map((value) => Math.round(Math.max(0, Math.min(1, value)) * 255));
        return `width:${Math.max(8, size[0])}px;height:${Math.max(8, size[1])}px;border-radius:${geometry && geometry.ty === "el" ? "999px" : "12px"};background:rgb(${rgb.join(", ")});`;
      }

      function previewKeyframesFromLottie() {
        const layer = firstPreviewLayer();
        if (!layer || !lastLottie) return "";
        const frameSet = new Set([0, Number(lastLottie.op) || 1]);
        ["p", "s", "r", "o"].forEach((key) => {
          keyList(layer, key).forEach((item) => {
            if (typeof item.t === "number") frameSet.add(item.t);
          });
        });
        const op = Math.max(1, Number(lastLottie.op) || 1);
        return Array.from(frameSet).sort((a, b) => a - b).map((frame) => {
          const p = valueAt(layer, "p", frame, [lastLottie.w / 2, lastLottie.h / 2, 0]);
          const s = valueAt(layer, "s", frame, [100, 100, 100]);
          const r = valueAt(layer, "r", frame, [0]);
          const o = valueAt(layer, "o", frame, [100]);
          const x = p[0] - lastLottie.w / 2;
          const y = p[1] - lastLottie.h / 2;
          const percent = Number(((frame / op) * 100).toFixed(2));
          return `${percent}% { opacity: ${(o[0] / 100).toFixed(3)}; transform: translate(${x.toFixed(1)}px, ${y.toFixed(1)}px) rotate(${(r[0] || 0).toFixed(1)}deg) scale(${(s[0] / 100).toFixed(3)}, ${(s[1] / 100).toFixed(3)}); }`;
        }).join("\n");
      }

      function planTitle(plan) {
        const actions = (plan.animationPlan || []).map((step) => step.action);
        if (plan.scenario === "spring_bounce" || ((actions.includes("soft_bounce") || actions.includes("float_y")) && (actions.includes("scale_pop") || actions.includes("pulse") || actions.includes("squash_stretch")))) {
          return "Пружинный прыжок";
        }
        if (actions.includes("shake_x")) return "Дрожание";
        return scenarioLabels[plan.scenario] || plan.scenario;
      }

      function planSummary(plan) {
        const actions = (plan.animationPlan || []).map((step) => step.action);
        if ((actions.includes("soft_bounce") || actions.includes("float_y")) && (actions.includes("scale_pop") || actions.includes("pulse") || actions.includes("squash_stretch"))) {
          return "Объект сначала сжимается, затем отталкивается вверх, возвращается вниз и мягко прожимается на посадке.";
        }
        return (plan.notes || []).find((note) => !note.startsWith("AI motion plan") && !note.startsWith("Duration target")) || "";
      }

      function stepList(plan) {
        return (plan.animationPlan || []).map((step, index) => `
          <li>
            <span>${(step.start / 1000).toFixed(2)}с</span>
            <strong>${escapeHtml(actionLabels[step.action] || step.action)}</strong>
          </li>
        `).join("");
      }

      function downloadLottie() {
        if (!lastLottie || !lastPlan) return;
        const fileName = `lotion-${lastPlan.scenario}-${Date.now()}.json`;
        const blob = new Blob([JSON.stringify(lastLottie, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        addLog("info", "Lottie JSON скачан", { fileName });
      }

      function renderPreview(plan, preview, lottie) {
        lastPlan = plan;
        lastLottie = lottie || null;
        previewPanel.hidden = false;
        const scenario = planTitle(plan);
        dynamicPreviewStyle.textContent = `@keyframes lotion-dynamic-preview {\n${previewKeyframesFromLottie()}\n}`;
        previewStage.style.setProperty("--preview-duration", `${Math.max(0.5, Math.min(5, plan.durationMs / 1000))}s`);
        previewScenario.textContent = scenario;
        previewTiming.textContent = `${(plan.durationMs / 1000).toFixed(1)} сек / ${plan.animationPlan.length} шага`;
        jsonOutput.value = JSON.stringify({ plan }, null, 2);

        const layer = firstPreviewLayer();
        const src = lottiePreviewSrc(layer);
        if (src) {
          previewStage.innerHTML = `<img class="preview-asset dynamic" src="${src}" alt="" />`;
        } else if (layer) {
          previewStage.innerHTML = `<div class="preview-shape dynamic" style="${shapePreviewStyle(layer)}"></div>`;
        } else {
          previewStage.innerHTML = "<span>Preview недоступен: Lottie не содержит видимого слоя</span>";
        }

        previewDetails.innerHTML = `
          <p class="preview-summary">${escapeHtml(planSummary(plan))}</p>
          <ol class="motion-steps">${stepList(plan)}</ol>
        `;

        if (lastLottie) {
          exportPanel.hidden = false;
          lottieOutput.value = JSON.stringify(lastLottie, null, 2);
        } else {
          exportPanel.hidden = true;
          lottieOutput.value = "";
        }
      }

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "log-entry") {
          logs = logs.concat([message.entry]).slice(-220);
          renderLogs();
          return;
        }

        if (message.type === "log-snapshot") {
          logs = logs.filter((entry) => entry.source === "ui").concat(message.logs).slice(-220);
          renderLogs();
          return;
        }

        setLoading(false, "");

        if (message.type === "error") {
          addLog("error", "UI получил ошибку", { message: message.message });
          errorBox.hidden = false;
          errorBox.textContent = `Не получилось выполнить запрос. ${message.message}`;
          setTab("logs");
          return;
        }

        errorBox.hidden = true;
        if (message.requestType === "check-feasibility") {
          addLog("info", "UI получил отчёт проверки", { level: message.result.level, score: message.result.score });
          renderReport(message.result);
          planBox.hidden = true;
        } else {
          addLog("info", "UI получил план генерации", {
            scenario: message.result.plan.scenario,
            durationMs: message.result.plan.durationMs,
            hasPreview: Boolean(message.preview && message.preview.svg)
          });
          renderPreview(message.result.plan, message.preview, message.result.lottie);
        }
      };

      fields.prompt.addEventListener("input", () => setLoading(false, ""));
      fields.durationSec.addEventListener("input", () => {
        durationLabel.textContent = `Длительность: ${fields.durationSec.value} сек`;
      });

      checkTab.addEventListener("click", () => setTab("check"));
      logsTab.addEventListener("click", () => setTab("logs"));
      downloadLottieButton.addEventListener("click", downloadLottie);
      clearLogsButton.addEventListener("click", () => {
        logs = [];
        renderLogs();
        parent.postMessage({ pluginMessage: { type: "clear-logs" } }, "*");
      });
      generateButton.addEventListener("click", () => send("generate-lottie"));
      setLoading(false, "");
      renderLogs();
      parent.postMessage({ pluginMessage: { type: "request-logs" } }, "*");
    </script>
  </body>
</html>
